<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  #root { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; max-width: 640px; }
  .full { grid-column: 1 / -1; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Textarea, Button } = window.OLAMMedSpaDesignSystem_e5ad93;
  function Demo() {
    const [v, setV] = React.useState('');
    return (
      <>
        <Input label="First name" id="f" placeholder="Enter your first name" required />
        <Input label="Phone" id="p" type="tel" placeholder="+1 (555) 000-0000" required />
        <div className="full">
          <Select label="Primary concern" id="c" placeholder="Select an area"
            value={v} onChange={(e)=>setV(e.target.value)}
            options={["Jawline & neck","Cheeks & mid-face","Crepey skin","Brow & eyes"]} />
        </div>
        <div className="full">
          <Textarea label="Anything else we should know?" id="n" rows={3}
            placeholder="Optional — tell us about your goals." />
        </div>
        <div className="full">
          <Button variant="accent" type="submit" arrow>Reserve my $100 consultation</Button>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
