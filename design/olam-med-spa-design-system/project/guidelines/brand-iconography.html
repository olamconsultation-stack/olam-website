<!-- @dsCard group="Brand" viewport="700x200" name="Iconography" subtitle="Material Symbols Outlined + typographic glyph accents." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 26px 32px; display: flex; flex-direction: column; gap: 22px; }
  .group { display: flex; align-items: center; gap: 26px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .material-symbols-outlined { font-size: 30px; color: var(--text-strong); }
  .circle { width: 40px; height: 40px; border-radius: 50%; background: var(--blue-500);
    display: flex; align-items: center; justify-content: center; }
  .circle .material-symbols-outlined { color: #fff; font-size: 22px; }
  .glyph { font-family: var(--font-display); font-size: 26px; color: var(--text-accent); font-weight: 300; }
  .arrow { color: var(--text-accent); font-size: 22px; }
  .stars { color: var(--amber-500); font-size: 20px; letter-spacing: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-500); }
  .lab { font-size: 10px; color: var(--text-subtle); }
  .divider { width: 1px; align-self: stretch; background: var(--border-hairline); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="group">
      <div class="item"><span class="material-symbols-outlined">spa</span><span class="lab">spa</span></div>
      <div class="item"><span class="material-symbols-outlined">verified</span><span class="lab">verified</span></div>
      <div class="item"><span class="material-symbols-outlined">science</span><span class="lab">science</span></div>
      <div class="item"><span class="material-symbols-outlined">schedule</span><span class="lab">schedule</span></div>
      <div class="item"><div class="circle"><span class="material-symbols-outlined">chevron_right</span></div><span class="lab">in pill</span></div>
      <div class="divider"></div>
      <div class="item"><span class="arrow">→</span><span class="lab">CTA</span></div>
      <div class="item"><span class="glyph">+</span><span class="lab">accordion</span></div>
      <div class="item"><span class="stars">★★★★★</span><span class="lab">rating</span></div>
      <div class="item"><div class="dot"></div><span class="lab">marker</span></div>
    </div>
  </div>
</body>
</html>
