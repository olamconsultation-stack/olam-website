<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals & Ink" subtitle="Near-black display ink through hairline greys." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-body); }
  .hex { font-size: 11px; color: var(--text-subtle); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900);border-color:transparent"></div><span class="name">ink-900 · dark</span><span class="hex">#1A1A1A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700);border-color:transparent"></div><span class="name">ink-700 · body</span><span class="hex">#2A2A2A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500);border-color:transparent"></div><span class="name">ink-500 · muted</span><span class="hex">#6B6B6B</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400);border-color:transparent"></div><span class="name">ink-400 · subtle</span><span class="hex">#71787E</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><span class="name">ink-300 · border</span><span class="hex">#C0C7CF</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><span class="name">ink-200 · divider</span><span class="hex">#E4E2DD</span></div>
  </div>
</body>
</html>
