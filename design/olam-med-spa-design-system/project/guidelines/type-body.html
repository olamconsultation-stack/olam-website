<!-- @dsCard group="Type" viewport="700x250" name="Body & Labels — Inter" subtitle="Lead, body, caption, and tracked uppercase eyebrow/label." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 24px 32px; display: flex; flex-direction: column; gap: 16px; max-width: 560px; }
  .lead { font-size: var(--text-lead); line-height: var(--lh-snug); color: var(--text-body); margin: 0; }
  .body { font-size: var(--text-body); line-height: var(--lh-body); color: var(--text-muted); margin: 0; }
  .cap { font-size: var(--text-caption); color: var(--text-subtle); margin: 0; }
  .eyebrow { font-size: var(--text-label); font-weight: var(--fw-bold); text-transform: uppercase;
    letter-spacing: var(--ls-label); color: var(--text-accent); margin: 0; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .t { font-size: 10px; color: var(--text-subtle); width: 70px; flex: none; text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="t">Eyebrow</span><p class="eyebrow">Honest Qualification</p></div>
    <div class="row"><span class="t">Lead 20</span><p class="lead">Firmer, lifted skin in 60–90 days — with a plan written before you decide.</p></div>
    <div class="row"><span class="t">Body 16</span><p class="body">Every OLAM treatment plan is personally reviewed and supervised by our Board Certified Medical Director.</p></div>
    <div class="row"><span class="t">Caption 12</span><p class="cap">Range per session area · financing from $45/mo</p></div>
  </div>
</body>
</html>
