<!-- @dsCard group="Type" viewport="700x230" name="Display — Sora" subtitle="Hero display with light-italic emphasis on emotional words." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); }
  .wrap { padding: 28px 32px; }
  .eyebrow { font-family: var(--font-body); font-size: var(--text-label); font-weight: var(--fw-bold);
    text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-accent); margin: 0 0 16px; }
  h1 { font-family: var(--font-display); font-weight: var(--fw-medium); font-size: var(--text-display);
    line-height: var(--lh-display); letter-spacing: var(--ls-display); margin: 0; }
  h1 i { font-weight: var(--fw-light); font-style: italic; color: var(--text-accent); }
  .meta { margin-top: 18px; font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Non-Surgical Skin Tightening</p>
    <h1>Tighten and lift your skin <i>without surgery.</i></h1>
    <p class="meta">Sora · 500 / 300 italic · clamp(3rem → 5.25rem) · line-height 0.92 · tracking −0.05em</p>
  </div>
</body>
</html>
